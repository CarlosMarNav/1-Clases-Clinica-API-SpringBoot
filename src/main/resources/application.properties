spring.application.name=proyectofinal_damc


#mode de conexion de la BBDD -> es el de commysql.cj.jdbc.Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#ruta a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3307/proyectofinal_damc
#Configuraciˇn de user y pass
spring.datasource.username=root
spring.datasource.password=pass


#Actualiza(update) y limpia las tablas(create-drop)
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create-drop


#muestra las peticiones SQL en la terminal
spring.jpa.show-sql=true

spring.data.rest.base-path=api